name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JULIA_PYTHONCALL_EXE: python3.12
      JULIA_CONDAPKG_BACKEND: Null
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pybtex dependency
        run: python -m pip install --upgrade pip pybtex
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'
      - name: Verify PythonCall can import pybtex
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); using PythonCall; pyimport("pybtex"); println("pybtex ok")'
      - name: Run Julia tests
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.test()'
